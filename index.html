<body>
    <form id="main">
        <header id="header">
            <h1>Login</h1>
        </header>
        <article id="corpo">
            <div class="input email">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Email@teste.com" required>
            </div>

            <div class="input senha">
                <label for="senha">Senha</label>
                <input type="password" id="senha" class="senhas" placeholder="Senha123" required>
            </div>

            <button type="submit" id="login" class="button">Login</button>
        </article>
        <footer id="footer">
            <a href="./senha.html">Esqueceu sua senha ?</a>
            <a href="./signin.html">Criar nova conta</a>
        </footer>
    </form>
